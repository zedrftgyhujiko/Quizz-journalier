name: Quiz quotidien Anesthésie-Réanimation

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Générer cours + quiz
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: node generate-quiz.js

      - name: Sauvegarder l'historique
        run: |
          git config user.name "Quiz Bot"
          git config user.email "quiz-bot@ar.fr"
          git add history.json
          git diff --staged --quiet || git commit -m "Historique $(date +%Y-%m-%d)"
          git push

      - name: Configurer Pages
        uses: actions/configure-pages@v5

      - name: Préparer l'artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Envoyer la notification
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: node send-notif.js
